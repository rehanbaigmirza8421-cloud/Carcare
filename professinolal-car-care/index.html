<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROFESSIONAL CAR CARE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- WELCOME -->
<div id="welcomeScreen" class="welcome-screen">
    <div class="overlay"></div>
    <div class="welcome-content">
        <h1>PROFESSIONAL CAR CARE</h1>
        <p>Workshop Management System</p>
        <button onclick="enterWorkshop()">Enter Workshop</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="main-app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">CAR CARE</div>

        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('vehicle')">Vehicle Entry</button>
        <button onclick="showPage('freecoating')">Free Coating</button>
        <button onclick="showPage('quotation')">Quotation</button>
        <button onclick="showPage('billing')">Billing</button>
        <button onclick="showPage('settings')">Settings</button>
    </aside>

    <!-- WORKSPACE -->
    <main class="workspace">

        <!-- DASHBOARD -->
        <section id="dashboard" class="page">
            <h1>Dashboard</h1>

            <div class="cards">
                <div class="card">
                    <h2 id="totalVehicles">0</h2>
                    <p>Total Vehicles</p>
                </div>

                <div class="card">
                    <h2 id="pendingVehicles">0</h2>
                    <p>Pending</p>
                </div>

                <div class="card">
                    <h2 id="completedVehicles">0</h2>
                    <p>Completed</p>
                </div>

                <div class="card">
                    <h2 id="freeCoatingCount">0</h2>
                    <p>Free Coating</p>
                </div>
            </div>
        </section>

        <!-- VEHICLE -->
        <!-- VEHICLE --><section id="vehicle" class="page hidden"><h1>Vehicle Entry</h1>

<input id="searchBox" placeholder="Search vehicle / customer">

<div class="form-grid">

    <input id="customerName" placeholder="Customer Name">

    <input id="mobileNumber" placeholder="Mobile Number">

    <input id="vehicleNumber" placeholder="Vehicle Number">

    <input id="vehicleModel" placeholder="Vehicle Model">

    <select id="vehicleWork">
        <option value="">Select Work</option>
        <option>Body Coating</option>
        <option>Interior Cleaning</option>
        <option>Under Body Coating</option>
        <option>Ceramic Coating</option>
        <option>PPF</option>
        <option>Rubbing & Polishing</option>
        <option>AC Cleaning</option>
    </select>

    <select id="vehicleStatus">
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
    </select>

</div>

<button class="gold-btn" onclick="saveVehicle()">
    Save Vehicle
</button>

<div id="vehicleTable"></div>

</section>

        <!-- FREE COATING -->
        <section id="freecoating" class="page hidden">
            <h1>Free Coating</h1>

            <div class="form-grid">
                <input id="fcName" placeholder="Customer Name">
                <input id="fcMobile" placeholder="Mobile Number">
                <input id="fcVehicle" placeholder="Vehicle Number">
                <input id="fcModel" placeholder="Vehicle Model">
            </div>

            <label>
                <input type="checkbox" id="fcDone">
                Free Coating Done
            </label>

            <button class="gold-btn" onclick="saveFreeCoating()">Save Record</button>

            <div id="freeCoatingList"></div>
        </section>

<!-- QUOTATION -->
<section id="quotation" class="page hidden">

    <h1>Quotation</h1>

    <div class="form-grid">
        <input id="qCustomer" placeholder="Customer Name">
        <input id="qMobile" placeholder="Mobile Number">
        <input id="qVehicle" placeholder="Vehicle Number">
        <input id="qModel" placeholder="Vehicle Model">
    </div>

    <h3 style="margin-top:20px;">Service / Work Details</h3>

    <div class="form-grid">
        <input id="qWork1" placeholder="Work 1">
        <input id="qRate1" type="number" placeholder="Amount">

        <input id="qWork2" placeholder="Work 2">
        <input id="qRate2" type="number" placeholder="Amount">

        <input id="qWork3" placeholder="Work 3">
        <input id="qRate3" type="number" placeholder="Amount">

        <input id="qWork4" placeholder="Work 4">
        <input id="qRate4" type="number" placeholder="Amount">

        <input id="qWork5" placeholder="Work 5">
        <input id="qRate5" type="number" placeholder="Amount">
    </div>

    <button class="gold-btn" onclick="generateQuotation()">
        Generate Quotation
    </button>

    <button class="gold-btn" onclick="downloadQuotationPDF()">
        Download PDF
    </button>

    <button class="gold-btn" onclick="shareQuotation()">
        Share WhatsApp
    </button>

    <div id="quotationPreview"></div>

</section>

            <!-- 🔥 SHARE BUTTON -->
            <button class="gold-btn" onclick="shareQuotation()">Share on WhatsApp</button>
        </section>

        <!-- BILLING -->
        <section id="billing" class="page hidden">
    <h1>Professional Invoice</h1><div class="form-grid">
    <input id="bCustomer" placeholder="Customer Name">
    <input id="bMobile" placeholder="Mobile Number">
    <input id="bVehicle" placeholder="Vehicle Number">
    <input id="bModel" placeholder="Vehicle Model">
</div>

<br>

<div class="form-grid">
    <input id="work1" placeholder="Work / Service">
    <input id="rate1" placeholder="Amount">
</div>

<div class="form-grid">
    <input id="work2" placeholder="Work / Service">
    <input id="rate2" placeholder="Amount">
</div>

<div class="form-grid">
    <input id="work3" placeholder="Work / Service">
    <input id="rate3" placeholder="Amount">
</div>

<button class="gold-btn" onclick="generateBill()">
    Generate Bill
</button>
<button class="gold-btn" onclick="downloadBillPDF()">
    Download PDF
</button>
<button class="gold-btn" onclick="shareBill()">
    Share WhatsApp
</button>

<button class="gold-btn" onclick="window.print()">
    Print Bill
</button>

<div id="billPreview"></div>

</section>

        <!-- SETTINGS -->
        <section id="settings" class="page hidden">
            <h1>Settings</h1>

            <div class="form-grid">
                <input id="companyName" placeholder="Company Name">
                <input id="ownerName" placeholder="Owner Name">
                <input id="ownerMobile" placeholder="Mobile">
                <input id="ownerEmail" placeholder="Email">
            </div>

            <label>
                <input type="checkbox" id="grey mode">
                Grey Mode
            </label>

            <button class="gold-btn" onclick="saveSettings()">Save Settings</button>
        </section>

    </main>
</div>

<script src="app.js"></script>

<script>
// 🔥 WHATSAPP SHARE FUNCTIONS (SAFE ADD - NO BREAK)

function shareBill(){
    let text = document.getElementById("billPreview").innerText;
    if(!text){ alert("No bill to share"); return; }

    let url = "https://wa.me/?text=" + encodeURIComponent(text);
    window.open(url, "_blank");
}

function shareQuotation(){
    let text = document.getElementById("quotationPreview").innerText;
    if(!text){ alert("No quotation to share"); return; }

    let url = "https://wa.me/?text=" + encodeURIComponent(text);
    window.open(url, "_blank");
}
</script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
